<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="أوراكل التاروت — إرشاد روحاني من خلال الأوراق، مخصص حسب برجك وعلم الأرقام وطاقات اليوم.">
  <meta name="theme-color" content="#0a0a12">
  <title>أوراكل التاروت</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- Background Particles -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div class="particles" id="particles"></div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- SCREEN: Onboarding -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div id="screen-onboarding" class="screen">
    <div class="onboarding-container">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- SCREEN: Home -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div id="screen-home" class="screen">
    <!-- Populated by JS -->
  </div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- SCREEN: Reading -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div id="screen-reading" class="screen">
    <!-- Populated by JS -->
  </div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- SCREEN: Card Glossary -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div id="screen-glossary" class="screen">
    <div id="glossary-container"></div>
  </div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- SCREEN: Numerology Reading -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div id="screen-numerology" class="screen">
    <div id="numerology-container"></div>
  </div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- SCREEN: Journal & Mirror -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div id="screen-journal" class="screen">
    <div id="journal-container"></div>
  </div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- SCREEN: Settings -->
  <!-- ════════════════════════════════════════════════════════ -->
  <div id="screen-settings" class="screen">
    <!-- Populated by JS -->
  </div>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- Scripts (order matters) -->
  <!-- ════════════════════════════════════════════════════════ -->
  <script src="js/i18n.js"></script>
  <script src="js/celestial.js"></script>
  <script src="js/numerology.js"></script>
  <script src="js/cards-major.js"></script>
  <script src="js/cards-minor-1.js"></script>
  <script src="js/cards-minor-2.js"></script>
  <script src="js/spreads.js"></script>
  <script src="js/interpreter.js"></script>
  <script src="js/journal.js"></script>
  <script src="js/i18n-social.js"></script>
  <script src="js/social.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
