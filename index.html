<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Tarot Oracle — Spiritual guidance through the cards, personalized by your zodiac sign, numerology, and the energies of the day.">
  <meta name="theme-color" content="#0a0a12">
  <title>Tarot Oracle | أوراكل التاروت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 30%, #1a0a2e 0%, #0d0d1a 50%, #0a0a12 100%);
      color: #e8d5a3;
      font-family: 'Cinzel Decorative', serif;
      overflow: hidden;
    }

    /* Floating particles */
    .particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: rgba(200, 168, 78, 0.4);
      border-radius: 50%;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .container {
      position: relative; z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    /* Living moon — breathes through its phases */
    .moon-orb {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 1.6rem;
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at 64% 30%, rgba(70,55,30,0.18) 0 6px, transparent 7px),
        radial-gradient(circle at 37% 55%, rgba(70,55,30,0.16) 0 10px, transparent 11px),
        radial-gradient(circle at 57% 71%, rgba(70,55,30,0.13) 0 6px, transparent 7px),
        radial-gradient(circle at 48% 44%, rgba(70,55,30,0.10) 0 4px, transparent 5px),
        radial-gradient(circle at 32% 30%, #fdf8ea 0%, #e6d4a0 55%, #cab885 100%);
      box-shadow: 0 0 40px rgba(232,213,150,0.40), inset -7px -7px 20px rgba(120,100,60,0.30);
      animation: glow 5s ease-in-out infinite;
    }
    .moon-orb::after {
      content: '';
      position: absolute;
      top: -6%;
      left: 0;
      width: 100%;
      height: 112%;
      border-radius: 50%;
      background: #0b0b16;
      filter: blur(2px);
      animation: moonphase 16s ease-in-out infinite;
    }
    @keyframes moonphase {
      0%   { transform: translateX(7%); }
      50%  { transform: translateX(105%); }
      100% { transform: translateX(7%); }
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(200, 168, 78, 0.3)); }
      50%      { filter: drop-shadow(0 0 20px rgba(200, 168, 78, 0.7)); }
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      color: #c8a84e;
      letter-spacing: 0.08em;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      font-family: 'Amiri', serif;
      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      color: rgba(200, 168, 78, 0.7);
      margin-bottom: 1.6rem;
      direction: rtl;
    }

    .stars {
      color: rgba(200, 168, 78, 0.35);
      font-size: 1rem;
      letter-spacing: 0.6em;
      margin-bottom: 2.5rem;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .btn {
      display: block;
      width: 260px;
      padding: 1rem 2rem;
      border: 1.5px solid rgba(200, 168, 78, 0.5);
      border-radius: 12px;
      background: rgba(200, 168, 78, 0.06);
      color: #e8d5a3;
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.1rem;
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: all 0.4s ease;
      backdrop-filter: blur(4px);
    }
    .btn:hover {
      background: rgba(200, 168, 78, 0.15);
      border-color: #c8a84e;
      box-shadow: 0 0 24px rgba(200, 168, 78, 0.2), inset 0 0 24px rgba(200, 168, 78, 0.05);
      transform: translateY(-2px);
    }

    .btn-ar {
      font-family: 'Amiri', serif;
      font-size: 1.3rem;
      direction: rtl;
    }

    /* English + its alternate languages, grouped */
    .lang-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
    }
    .lang-alts {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.85rem;
    }
    .lang-alt {
      color: rgba(200, 168, 78, 0.6);
      text-decoration: none;
      letter-spacing: 0.04em;
      padding: 0.15rem 0.2rem;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    .lang-alt:hover {
      color: #e8d5a3;
      text-shadow: 0 0 12px rgba(200, 168, 78, 0.5);
    }
    .lang-dot { color: rgba(200, 168, 78, 0.3); }

    .footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: rgba(200, 168, 78, 0.25);
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="container">
    <h1>Tarot Oracle</h1>
    <div class="subtitle">أوراكل التاروت</div>
    <div class="moon-orb" role="img" aria-label="The moon"></div>
    <div class="stars">✦ ✦ ✦</div>

    <div class="buttons">
      <div class="lang-group">
        <a href="en/?lang=en" class="btn">English</a>
        <div class="lang-alts">
          <a href="en/?lang=fr" class="lang-alt">Français</a>
          <span class="lang-dot">·</span>
          <a href="en/?lang=es" class="lang-alt">Español</a>
        </div>
      </div>
      <a href="ar/" class="btn btn-ar">العربية</a>
    </div>

    <div class="footer">ETHEREAL ECHOES</div>
  </div>

  <script>
    // Floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 8) + 's';
      p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
      container.appendChild(p);
    }
  </script>

</body>
</html>
